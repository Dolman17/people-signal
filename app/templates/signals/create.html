{% extends "base.html" %}

{% block title %}Add Signal | PeopleSignal{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl">
    <h1 class="text-3xl font-bold">Add signal</h1>

    <form method="POST" class="mt-6 space-y-4 rounded-2xl border border-slate-800 bg-slate-900 p-6">
        <div>
            <label class="text-sm font-medium text-slate-300">Company</label>
            <select name="company_id" required
                    class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100">
                {% for company in companies %}
                    <option value="{{ company.id }}">{{ company.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="text-sm font-medium text-slate-300">Signal type</label>
            <select name="signal_type"
                    class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100">
                <option value="leadership_change">Leadership change</option>
                <option value="rapid_hiring">Rapid hiring</option>
                <option value="regulatory_concern">Regulatory concern</option>
                <option value="negative_publicity">Negative publicity</option>
                <option value="restructuring_signal">Restructuring signal</option>
            </select>
        </div>

        <div>
            <label class="text-sm font-medium text-slate-300">Source</label>
            <input name="source"
                   class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100">
        </div>

        <div>
            <label class="text-sm font-medium text-slate-300">Title</label>
            <input name="title"
                   class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100">
        </div>

        <div>
            <label class="text-sm font-medium text-slate-300">Raw text</label>
            <textarea name="raw_text" rows="5"
                      class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100"></textarea>
        </div>

        <div>
            <label class="text-sm font-medium text-slate-300">Confidence score</label>
            <input name="confidence_score" type="number" step="0.1" min="0" max="10"
                   class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100">
        </div>

        <button class="rounded-lg bg-cyan-500 px-4 py-2 font-semibold text-slate-950 hover:bg-cyan-400">
            Save signal
        </button>
    </form>
</div>
{% endblock %}
